<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoreLearn • Учи корейский как на Netflix + Duolingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .korean-font { font-family: 'Noto Sans KR', sans-serif; }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
    </style>
</head>
<body class="bg-[#0A0A0A] text-white min-h-screen">

    <!-- NAV (оставил тот же, что был раньше) -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-rose-500 to-pink-600 rounded-2xl flex items-center justify-center text-2xl">🇰🇷</div>
                <h1 class="text-3xl font-semibold tracking-tighter">KoreLearn <span class="korean-font text-rose-500">한글</span></h1>
            </div>
            <div class="hidden md:flex gap-x-8 text-sm font-medium">
                <a onclick="navigateTo('home')" class="cursor-pointer hover:text-rose-400">Главная</a>
                <a onclick="navigateTo('grammar')" class="cursor-pointer hover:text-rose-400">Грамматика</a>
                <a onclick="navigateTo('dramas')" class="cursor-pointer hover:text-rose-400">Дорамы</a>
                <a onclick="navigateTo('profile')" class="cursor-pointer hover:text-rose-400">Профиль</a>
            </div>
            <div class="flex items-center gap-x-4">
                <div id="streak-badge" class="hidden flex items-center bg-zinc-900 border border-amber-400/30 rounded-3xl px-5 py-2 cursor-pointer">
                    <i class="fa-solid fa-fire text-amber-400 mr-2"></i>
                    <span id="streak-count" class="font-semibold text-amber-400">0</span>
                </div>
                <button onclick="showAuthModal()" id="auth-button" class="bg-white text-black px-6 py-2 rounded-3xl font-semibold">Войти</button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 py-10">

        <!-- DRAMAS VIEW (главное, что ты просил) -->
        <div id="view-dramas" class="view">
            <h2 class="text-4xl font-semibold mb-8">Дорамы для изучения корейского</h2>
            
            <div id="dramas-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Заполняется через JavaScript -->
            </div>
        </div>

        <!-- Остальные разделы (home, grammar, profile) остались как раньше -->
        <!-- ... (полный код слишком длинный, но он такой же, как я давал раньше) ... -->

    </div>

    <script>
        // === МАССИВ С ДОРАМАМИ С КРАСИВЫМИ ПОСТЕРАМИ ===
        const dramas = [
            {
                id: 1,
                title: "Алхимия душ",
                korean: "환혼",
                level: "beginner",
                subs: "Русские субтитры",
                description: "Фэнтези о магах, душах и судьбе. Отлично подходит для начинающих.",
                oid: "-64354864",
                vid: "456247272",
                poster: "https://i.pinimg.com/736x/02/cb/5b/02cb5bc3fa2b3f7b604c8b590aaca75e.jpg", // красивый официальный стиль
                vocab: [
                    { kr: "마법", ru: "Магия" },
                    { kr: "영혼", ru: "Душа" },
                    { kr: "환혼", ru: "Алхимия душ" }
                ]
            },
            {
                id: 2,
                title: "Алые сердца: Корё",
                korean: "달의 연인 - 보보경심 려",
                level: "intermediate",
                subs: "Русские субтитры",
                description: "Историческая мелодрама о любви, дворце и судьбе.",
                oid: "-24701639",
                vid: "456239549",
                poster: "https://wallpapercave.com/wp/wp12345678.jpg", // замени на реальный если найдёшь, или оставь этот стиль
                poster: "https://i.pinimg.com/originals/xx/xx/xx/scarlet-heart-ryeo-poster.jpg", // можно искать лучше
                vocab: [
                    { kr: "사랑", ru: "Любовь" },
                    { kr: "왕", ru: "Король" },
                    { kr: "궁전", ru: "Дворец" }
                ]
            },
            {
                id: 3,
                title: "Месть от третьего лица",
                korean: "3인칭 복수",
                level: "advanced",
                subs: "Русские субтитры",
                description: "Школьный триллер о мести и тайнах.",
                oid: "-64354864",
                vid: "456248146",
                poster: "https://i.pinimg.com/736x/7f/7a/a9/7f7aa925191d1a69fc12db9fbf3cbb38.jpg",
                vocab: [
                    { kr: "복수", ru: "Месть" },
                    { kr: "비밀", ru: "Секрет" }
                ]
            },
            {
                id: 4,
                title: "Приятного аппетита, Ваше Величество",
                korean: "폭군의 셰프",
                level: "intermediate",
                subs: "Русские субтитры",
                description: "Романтическая комедия про шеф-повара и тирана.",
                oid: "-190202942",
                vid: "456245782",
                poster: "https://www.kinopoisk.ru/images/film_big/7078532.jpg", // если есть, или любой другой
                vocab: [
                    { kr: "요리", ru: "Кухня" },
                    { kr: "맛있다", ru: "Вкусно" }
                ]
            }
        ];

        // Функция отрисовки дорам
        function renderDramas() {
            const container = document.getElementById('dramas-grid');
            container.innerHTML = '';
            dramas.forEach(drama => {
                const card = document.createElement('div');
                card.className = 'bg-zinc-900 rounded-3xl overflow-hidden card-hover cursor-pointer';
                card.innerHTML = `
                    <img src="${drama.poster}" alt="${drama.title}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h4 class="font-semibold text-xl mb-1">${drama.title}</h4>
                        <p class="text-xs text-zinc-400 mb-3">${drama.korean}</p>
                        <p class="text-sm text-zinc-400 line-clamp-3">${drama.description}</p>
                        <div class="mt-6 text-rose-400 text-sm font-medium">Смотреть →</div>
                    </div>
                `;
                card.onclick = () => showDrama(drama);
                container.appendChild(card);
            });
        }

        // Запуск сайта
        window.onload = () => {
            renderDramas();
            navigateTo('dramas'); // сразу открываем раздел дорам
            console.log('✅ Сайт готов! Постеры обновлены.');
        };

        // Остальные функции (navigateTo, showDrama и т.д.) оставь из предыдущей версии
    </script>
</body>
</html>
